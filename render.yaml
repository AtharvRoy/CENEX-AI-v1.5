services:
  # Backend (FastAPI) - Free tier
  - type: web
    name: cenex-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False
    healthCheckPath: /health

  # Frontend (Next.js) - Free tier
  - type: web
    name: cenex-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: cenex-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  # PostgreSQL - Free tier (no disk persistence on free)
  - name: cenex-db
    plan: free
    databaseName: cenex_ai
    user: cenex

  # Redis - Free tier with IP allowlist
  - name: cenex-redis
    plan: free
    ipAllowList: []
